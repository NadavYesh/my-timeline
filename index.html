<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nadav – Elliptical Career Timeline</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    background: #020617;
    font-family: 'Inter', sans-serif;
    color: #e2e8f0;
    display: flex;
    justify-content: center;
    padding: 20px 0;
  }

  .container {
    width: 100%;
    max-width: 1200px;
    text-align: center;
  }

  /* INTRO */
  .intro {
    padding: 20px 40px;
    background: #0f172a;
    border-radius: 16px;
    margin-bottom: 20px;
    box-shadow: 0 18px 40px rgba(0,0,0,0.6);
  }

  .intro h2 {
    margin: 0 0 8px;
    font-size: 28px;
    font-family: 'Poppins', sans-serif;
    color: #f9fafb;
  }

  .intro p {
    margin: 0;
    font-size: 15px;
    color: #cbd5e1;
  }

  /* FILTERS */
  .filters {
    margin-bottom: 16px;
    display: flex;
    justify-content: center;
    gap: 12px;
  }

  .filter-btn {
    padding: 7px 16px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: 2px solid transparent;
    transition: 0.18s ease;
    font-family: 'Poppins', sans-serif;
  }

  .filter-btn.edu {
    background: rgba(56,189,248,0.18);
    color: #38bdf8;
    border-color: rgba(56,189,248,0.4);
  }
  .filter-btn.work {
    background: rgba(249,115,22,0.18);
    color: #f97316;
    border-color: rgba(249,115,22,0.4);
  }

  .filter-btn.active.edu { background:#38bdf8; color:#020617; }
  .filter-btn.active.work { background:#f97316; color:#020617; }

  /* TIMELINE AREA */
  .timeline-wrapper {
    position: relative;
    width: 100%;
    max-width: 1200px;
    height: 460px; /* modified slightly for screen real estate */
    margin: 0 auto 20px auto;
  }

  svg {
    display: block;
    width: 100%;
    height: 100%;
    overflow: visible;
  }

  .event-dot {
    position: absolute;
    width: 22px;
    height: 22px;
    border-radius: 999px;
    border: 4px solid #020617;
    transform: translate(-50%, -50%);
    cursor: pointer;
    box-shadow: 0 0 0 5px rgba(15,23,42,0.8);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    z-index: 10;
  }

  .event-dot.long {
    width: 28px;
    height: 28px;
    box-shadow: 0 0 0 6px rgba(248,250,252,0.15);
  }

  .event-dot.active {
    transform: translate(-50%, -50%) scale(1.15);
    box-shadow: 0 0 0 8px rgba(248,250,252,0.25);
  }

  .dot-edu { background:#38bdf8; }
  .dot-work { background:#f97316; }

  .event-label {
    position: absolute;
    width: max-content;
    max-width: 150px;
    font-size: 13.5px;
    font-weight: 600;
    font-family: 'Poppins', sans-serif;
    text-align: left;
    color: #f1f5f9;
    pointer-events: auto;
    cursor: pointer;
    transform: translate(20px, -50%); /* Placed to the right of the vertical line */
    text-shadow: 0 2px 4px #000, 0 0 10px rgba(0,0,0,0.8);
    z-index: 10;
  }
  
  .year-mark {
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 15px;
    fill: #94a3b8;
    paint-order: stroke;
    stroke: #020617;
    stroke-width: 6px;
    user-select: none;
    pointer-events: none;
  }

  /* DETAIL PANEL */
  .detail-card {
    margin: 0 auto;
    max-width: 740px;
    background: #020617;
    border-radius: 18px;
    padding: 20px 24px;
    border: 1px solid #1f2937;
    box-shadow: 0 18px 40px rgba(0,0,0,0.7);
    text-align: left;
  }

  .detail-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.11em;
    background: #111827;
    color: #9ca3af;
    margin-bottom: 6px;
  }

  .detail-dot {
    width: 10px;
    height: 10px;
    border-radius: 999px;
  }

  .detail-title {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    font-size: 20px;
    margin-bottom: 4px;
  }

  .detail-date {
    font-size: 13px;
    color: #9ca3af;
    margin-bottom: 10px;
  }

  .detail-desc {
    font-size: 14px;
    color: #e5e7eb;
    line-height: 1.45;
  }

  .detail-desc a {
    color: #38bdf8;
  }

  @media (max-width: 900px) {
    body {
      padding-bottom: 220px; /* space for the fixed detail card */
    }
    .timeline-wrapper {
      height: auto;
      min-height: 480px;
      overflow-x: hidden;
    }
    .timeline-wrapper > svg {
      width: 100%;
      height: auto;
    }
    .detail-card {
      position: fixed;
      bottom: 12px;
      left: 12px;
      right: 12px;
      z-index: 100;
      max-height: 200px;
      overflow-y: auto;
      box-shadow: 0 -10px 40px rgba(0,0,0,0.9);
      border-radius: 16px;
    }
  }
</style>
</head>
<body>

<div class="container">

  <div class="intro">
    <h2>NADAV YESHAYAHU</h2>
    <p>Enjoy my career path!</p>
  </div>

  <div class="filters">
    <button class="filter-btn edu active" data-cat="edu">Education & Courses</button>
    <button class="filter-btn work active" data-cat="work">Work</button>
  </div>

  <div class="timeline-wrapper" id="timeline">
    <svg id="timeline-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460" preserveAspectRatio="xMidYMid meet">
      <!-- Arrows and Highlights -->
      <defs>
        <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto">
          <polygon points="0 0, 6 3, 0 6" fill="#334155" />
        </marker>
        <marker id="arrowhead-hl" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto">
          <polygon points="0 0, 6 3, 0 6" fill="#f8fafc" />
        </marker>
      </defs>
      
      <!-- Snake track will be injected here -->
      <path id="base-path" fill="none" stroke="#334155" stroke-width="6" marker-end="url(#arrowhead)" />
      
      <!-- Active Highlight segment -->
      <path id="hl-path" fill="none" stroke="#f8fafc" stroke-width="12" stroke-linecap="round" style="transition: stroke-dasharray 0.4s ease; opacity: 0;" />
      
      <!-- Year indicators injected dynamically -->
      <g id="year-group"></g>
    </svg>
  </div>

  <div class="detail-card" id="detail-card">
    <div class="detail-badge">
      <span class="detail-dot" id="detail-dot"></span>
      <span id="detail-cat-label">Event</span>
    </div>
    <h3 class="detail-title" id="detail-title">Click an event on the timeline</h3>
    <div class="detail-date" id="detail-date">
      Your roles, degrees and courses will appear here.
    </div>
    <div class="detail-desc" id="detail-desc">
      Choose a point on the ellipse to see more details.
    </div>
  </div>

</div>

<script>
  const catConfig = {
    edu:   { label: "Education", color: "#38bdf8" },
    work:  { label: "Work",      color: "#f97316" }
  };

  const events = [
    {cat:"work", title:"Data & Automation Analyst — PMO", shortTitle: "Data Analyst", date:"Nov 2016 – Apr 2019",
     startT: new Date("2016-11-01").getTime(), endT: new Date("2019-04-01").getTime(),
     desc:"Integrated Palantir and automated reporting pipelines, achieving 100% adoption while accelerating processing by 60% and saving ~30 analyst-hours daily.", long:true},

    {cat:"edu", title:"Big Data (Palantir Foundry)", shortTitle: "Palantir", date:"Jan 2018",
     startT: new Date("2018-01-15").getTime(), endT: new Date("2018-01-15").getTime(),
     desc:"Hands-on big data course using Palantir Foundry; completed with excellence.", long:false},

    {cat: "edu", title: "Rimon Music School – Music Production", shortTitle: "Music Production", date: "Sep 2020 – Jul 2021",
     startT: new Date("2020-09-01").getTime(), endT: new Date("2021-07-01").getTime(),
     desc: "Music Production in Tel Aviv IL", long: true},

    {cat:"edu", title:"BSc Econometrics & Operations Research — RUG", shortTitle: "BSc Econometrics", date:"Sep 2021 – Nov 2024",
     startT: new Date("2021-09-01").getTime(), endT: new Date("2024-11-01").getTime(),
     desc:"Thesis: Container Sequencing in Temporary Hubs - Cargo Bike Logistics", long:true},

    {cat:"work", title:"Teaching Assistant — RUG", shortTitle: "Teaching Assistant", date:"Dec 2022 – Mar 2023",
     startT: new Date("2022-12-01").getTime(), endT: new Date("2023-03-01").getTime(),
     desc:"Transformed handwritten lecture notes into clear LaTeX slides; improved student satisfaction and attendance.", long:true},

    {cat:"work", title:"Founder — commgro.com", shortTitle: "Founder", date:"Aug 2024 – Aug 2025",
     startT: new Date("2024-08-01").getTime(), endT: new Date("2025-08-01").getTime(),
     desc:"Founded an online creators community-building platform connecting fans and students with creators (e.g., filmmaking tutorials) on skool.com", long:true},

    {cat:"edu", title:"SQL for Data Science — IBM", shortTitle: "SQL", date:"30 Sep 2025",
     startT: new Date("2025-09-30").getTime(), endT: new Date("2025-09-30").getTime(),
     desc:`Completed with certification.<br><a href="https://www.credly.com/badges/50f596d6-b204-4560-b210-a4e689f6ce4e" target="_blank">Certificate link</a>`, long:false},

    {cat:"edu", title:"MSc Business Analytics and Data Science — UvA", shortTitle: "MSc Data Science", date:"Sep 2025 – Present",
     startT: new Date("2025-09-01").getTime(), endT: new Date("2026-06-30").getTime(),
     desc:"Thesis: Optimizing Retrieval Pipelines for Financial RAG", long:true},

    {cat:"work", title:"Intern Cognitive Data Scientist, IFF", shortTitle: "Data Science Intern", date:"Feb 2026 – Present",
     startT: new Date("2026-02-01").getTime(), endT: new Date("2026-06-30").getTime(),
     desc:"Business Automation of statistical pipelines; using Python, R, and VBA", long:true},

    {cat: "edu", title: "Python OOP", shortTitle: "Python OOP", date: "Feb 2026",
     startT: new Date("2026-02-15").getTime(), endT: new Date("2026-02-15").getTime(),
     desc: `Object Oriented Programming course. <br><a href="https://www.linkedin.com/learning/certificates/28a51bf008bb33bb2d79216bc987352ceff073a900db8c9eaa3ad331bec2e7b0" target="_blank">Certificate link</a>`, long: false}
  ];

  const minYear = 2016;
  const maxYear = 2027; // gives some padding
  const minTime = new Date(`${minYear}-01-01`).getTime();
  const maxTime = new Date(`${maxYear}-01-01`).getTime();

  // Non-linear Compressor map
  const allDates = new Set();
  events.forEach(ev => {
    allDates.add(ev.startT);
    if (ev.long) allDates.add(ev.endT);
  });
  for(let yr = minYear; yr <= maxYear; yr++) {
    allDates.add(new Date(`${yr}-01-01`).getTime());
  }
  const T = Array.from(allDates).sort((a,b) => a - b).filter(t => t >= minTime && t <= maxTime);

  // Adjust blend to balance realistic time gaps vs uniform event spacing
  const blend = 0.65; // Higher ordinal bias = more uniform spacing for events
  const mappedM = T.map((t, i) => {
    const L = (t - minTime) / (maxTime - minTime); // True chronological time
    const O = i / (T.length - 1);                  // Pure event sequence (ordinal)
    
    return blend * O + (1 - blend) * L;
  });

  function timeToRatio(t) {
    if (t <= minTime) return 0;
    if (t >= maxTime) return 1;
    for (let i = 0; i < T.length - 1; i++) {
      if (t >= T[i] && t <= T[i+1]) {
        const localRatio = (t - T[i]) / (T[i+1] - T[i]);
        return mappedM[i] + localRatio * (mappedM[i+1] - mappedM[i]);
      }
    }
    return 1;
  }

  const timelineSVG = document.getElementById("timeline-svg");
  const basePath = document.getElementById("base-path");
  const hlPath = document.getElementById("hl-path");
  const timeline = document.getElementById("timeline");
  const yearGroup = document.getElementById("year-group");
  
  let totalLength = 0;
  let dots = [];
  let labels = [];
  let selectedIndex = null;

  function renderTimeline() {
    yearGroup.innerHTML = "";
    dots.forEach(d => d.remove());
    labels.forEach(l => l.remove());
    dots = [];
    labels = [];

    const isMobile = window.innerWidth <= 900;
    let d = "";
    let svgWidth, svgHeight;
    
    if (isMobile) {
      let padding = 30;
      svgWidth = timeline.clientWidth || window.innerWidth;
      if (svgWidth < 300) svgWidth = 300;
      
      const rows = 12;
      const rowSpacing = 90;
      svgHeight = padding * 2 + (rows - 1) * rowSpacing;
      timelineSVG.setAttribute("viewBox", `0 0 ${svgWidth} ${svgHeight}`);
      
      const r = rowSpacing / 2;
      let y = svgHeight - padding;
      let rightward = true;
      
      d = `M ${padding} ${y}`;
      
      for (let i = 0; i < rows; i++) {
        const xDest = rightward ? svgWidth - padding : padding;
        if (i < rows - 1) {
          const xLineEnd = rightward ? xDest - r : xDest + r;
          d += ` L ${xLineEnd} ${y}`;
          
          if (rightward) {
            d += ` A ${r} ${r} 0 0 0 ${xDest} ${y - r}`;
            d += ` A ${r} ${r} 0 0 0 ${xDest - r} ${y - 2*r}`;
          } else {
            d += ` A ${r} ${r} 0 0 1 ${xDest} ${y - r}`;
            d += ` A ${r} ${r} 0 0 1 ${xDest + r} ${y - 2*r}`;
          }
          y -= rowSpacing;
        } else {
          d += ` L ${xDest} ${y}`;
        }
        rightward = !rightward;
      }
    } else {
      svgWidth = 1200;
      svgHeight = 460;
      timelineSVG.setAttribute("viewBox", `0 0 ${svgWidth} ${svgHeight}`);
      
      const padX = 60;
      const padY = 60;
      const cols = 9; 
      const colW = (svgWidth - 2 * padX) / (cols - 1);
      
      let x = padX;
      let downward = true;
      const r = colW / 2;
      
      d = `M ${padX} ${padY}`;
      for (let i = 0; i < cols; i++) {
        const yDest = downward ? svgHeight - padY : padY;
        if (i < cols - 1) {
          const yLineEnd = downward ? yDest - r : yDest + r;
          d += ` L ${x} ${yLineEnd}`;
          
          if (downward) {
            d += ` A ${r} ${r} 0 0 0 ${x + r} ${yDest}`;
            d += ` A ${r} ${r} 0 0 0 ${x + 2*r} ${yDest - r}`;
          } else {
            d += ` A ${r} ${r} 0 0 1 ${x + r} ${yDest}`;
            d += ` A ${r} ${r} 0 0 1 ${x + 2*r} ${yDest + r}`;
          }
          x += colW;
        } else {
          d += ` L ${x} ${yDest}`;
        }
        downward = !downward;
      }
    }
  
    basePath.setAttribute("d", d);
    hlPath.setAttribute("d", d);
    totalLength = basePath.getTotalLength();
    
    for(let yr = minYear; yr <= maxYear - 1; yr++) {
      const t = new Date(`${yr}-01-01`).getTime();
      if(t >= minTime && t <= maxTime) {
        const rRatio = timeToRatio(t);
        const pt = basePath.getPointAtLength(rRatio * totalLength);
        
        const txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
        txt.setAttribute("x", pt.x);
        txt.setAttribute("y", isMobile ? pt.y - 12 : pt.y);
        txt.setAttribute("class", "year-mark");
        txt.setAttribute("text-anchor", "middle");
        txt.setAttribute("dominant-baseline", "central");
        txt.textContent = yr;
        yearGroup.appendChild(txt);
        
        if (yr > minYear && yr < maxYear - 1) {
          const arr = document.createElementNS("http://www.w3.org/2000/svg", "path");
          arr.setAttribute("d", "M -5 -4 L 4 0 L -5 4 Z");
          arr.setAttribute("fill", "#64748b");
          
          let arrDist = rRatio * totalLength + 30; 
          if (arrDist > totalLength) arrDist = rRatio * totalLength - 30;
          
          const arrPt = basePath.getPointAtLength(arrDist);
          const arrPt2 = basePath.getPointAtLength(arrDist + 1);
          const arrAng = Math.atan2(arrPt2.y - arrPt.y, arrPt2.x - arrPt.x) * (180 / Math.PI);
          
          arr.setAttribute("transform", `translate(${arrPt.x}, ${arrPt.y}) rotate(${arrAng})`);
          yearGroup.appendChild(arr);
        }
      }
    }
    
    events.forEach((ev, i) => {
      const rStart = timeToRatio(ev.startT);
      const pt = basePath.getPointAtLength(rStart * totalLength);

      const dot = document.createElement("div");
      dot.className = `event-dot dot-${ev.cat}` + (ev.long ? " long" : "");
      dot.style.left = (pt.x / svgWidth * 100) + "%";
      dot.style.top  = (pt.y / svgHeight * 100) + "%";
      dot.dataset.index = i;
      dot.dataset.cat   = ev.cat;

      const label = document.createElement("div");
      label.className = "event-label";
      label.style.left = (pt.x / svgWidth * 100) + "%";
      label.style.top  = (pt.y / svgHeight * 100) + "%";
      
      if (isMobile) {
        label.style.transform = "translate(-50%, -36px)";
        label.style.textAlign = "center";
        label.style.maxWidth = "110px";
      } else {
        const padX = 60;
        const cols = 9;
        const colW = (svgWidth - 2 * padX) / (cols - 1);
        const colIndex = Math.round((pt.x - padX) / colW);
        if (colIndex % 2 === 1) {
          label.style.transform = "translate(20px, -50%)";
        } else {
          if (colIndex === cols - 1) {
            label.style.transform = "translate(calc(-100% - 20px), -50%)";
            label.style.textAlign = "right";
          } else {
            label.style.transform = "translate(20px, -50%)";
          }
        }
      }
      
      label.innerHTML = ev.shortTitle || ev.title;
      label.dataset.index = i;
      label.dataset.cat   = ev.cat;

      timeline.appendChild(dot);
      timeline.appendChild(label);
      dots.push(dot);
      labels.push(label);
    });

    applyFilters();
    if (selectedIndex !== null) selectEvent(selectedIndex);
  }

  const detailDot   = document.getElementById("detail-dot");
  const detailCatLb = document.getElementById("detail-cat-label");
  const detailTitle = document.getElementById("detail-title");
  const detailDate  = document.getElementById("detail-date");
  const detailDesc  = document.getElementById("detail-desc");

  function selectEvent(idx) {
    if (idx === null) return;
    const ev = events[idx];
    dots.forEach(d => d.classList.remove("active"));
    if (dots[idx]) dots[idx].classList.add("active");

    const conf = catConfig[ev.cat];
    detailDot.style.background = conf.color;
    detailCatLb.textContent    = conf.label;
    detailTitle.textContent    = ev.title;
    detailDate.textContent     = ev.date;
    detailDesc.innerHTML       = ev.desc;

    if (ev.long) {
      const rStart = timeToRatio(ev.startT);
      const rEnd = timeToRatio(ev.endT);
      const dashOffset = rStart * totalLength;
      const dashLen = (rEnd - rStart) * totalLength;
      
      hlPath.style.strokeDasharray = `0 ${dashOffset} ${dashLen} ${totalLength * 2}`;
      hlPath.style.stroke = conf.color;
      hlPath.style.opacity = "0.85";
    } else {
      hlPath.style.opacity = "0";
    }

    selectedIndex = idx;
  }

  const btns = document.querySelectorAll(".filter-btn");

  function applyFilters() {
    const activeCats = Array.from(btns)
      .filter(b => b.classList.contains("active"))
      .map(b => b.dataset.cat);

    dots.forEach((dot, i) => {
      const cat = dot.dataset.cat;
      const shown = activeCats.includes(cat);
      dot.style.display   = shown ? "block" : "none";
      if(labels[i]) labels[i].style.display = shown ? "block" : "none";
    });

    if (selectedIndex !== null && !activeCats.includes(events[selectedIndex].cat)) {
      if (dots[selectedIndex]) dots[selectedIndex].classList.remove("active");
      selectedIndex = null;
      detailDot.style.background = "#4b5563";
      detailCatLb.textContent = "Event";
      detailTitle.textContent = "Click an event on the timeline";
      detailDate.textContent  = "Your roles, degrees and courses will appear here.";
      detailDesc.textContent  = "Choose a point on the ellipse to see more details.";
      hlPath.style.opacity = "0";
    }
  }

  btns.forEach(btn => {
    btn.addEventListener("click", () => {
      btn.classList.toggle("active");
      applyFilters();
    });
  });

  timeline.addEventListener("click", (e) => {
    const target = e.target;
    if (target.classList.contains("event-dot") || target.classList.contains("event-label")) {
      const idx = parseInt(target.dataset.index);
      selectEvent(idx);
    }
  });

  renderTimeline();

  let resizeTimeout;
  window.addEventListener("resize", () => {
    clearTimeout(resizeTimeout);
    resizeTimeout = setTimeout(() => {
      renderTimeline();
    }, 200);
  });
</script>

</body>
</html>
